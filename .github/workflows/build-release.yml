name: "Release"
# Build signed DMG and create GitHub release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

jobs:
  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.SIGNING_CERTIFICATE_P12_DATA_MACOS }}
          p12-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD_MACOS }}

      - name: Build DMG
        run: ./gradlew packageReleaseDmg

      - name: Install notarization tools
        run: |
          gem install bundler
          cat > Gemfile << 'EOF'
          source "https://rubygems.org"
          gem "fastlane"
          EOF
          bundle install

      - name: Write API key
        run: echo "$KEY" > mac-api-key.json
        env:
          KEY: ${{ secrets.APPSTORE_CONNECT_API_JSON }}

      - name: Notarize DMG
        run: |
          VERSION=$(cat VERSION)
          bundle exec fastlane run notarize \
            package:"composeApp/build/compose/binaries/main-release/dmg/Slides-${VERSION}.dmg" \
            bundle_id:"com.yannickpulver.slides" \
            api_key_path:"mac-api-key.json" \
            print_log:"true"

      - name: Upload DMG as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Slides-dmg
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg

  release-mac:
    needs: [ build-mac ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: get_version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "./Slides-dmg/*.dmg"
          file_glob: true
          tag: ${{ steps.get_version.outputs.version }}
          overwrite: true
          body: "Release ${{ steps.get_version.outputs.version }}"
