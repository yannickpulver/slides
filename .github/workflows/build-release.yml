name: "Release"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Get version
        id: get_version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Parse App Store Connect API key
        id: apple
        run: |
          echo "issuer_id=$(echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.issuer_id')" >> $GITHUB_OUTPUT
          echo "key_id=$(echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.key_id')" >> $GITHUB_OUTPUT
          echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.key' > /tmp/AuthKey.p8

      - name: Build, sign and publish with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: make copied-site
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_NOTARY_ISSUER_ID: ${{ steps.apple.outputs.issuer_id }}
          APPLE_NOTARY_KEY_ID: ${{ steps.apple.outputs.key_id }}
          APPLE_NOTARY_KEY: /tmp/AuthKey.p8

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "output/*"
          file_glob: true
          tag: ${{ steps.get_version.outputs.version }}
          overwrite: true
          body: "Release ${{ steps.get_version.outputs.version }}"
