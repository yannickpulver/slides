name: "Release"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Write Apple signing certificate
        run: echo "${{ secrets.SIGNING_CERTIFICATE_P12_DATA_MACOS }}" | base64 -d > /tmp/apple-dev-id.p12

      - name: Build JVM JAR
        run: ./gradlew :composeApp:jvmJar

      - name: Build, sign, notarize and publish
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: make copied-site
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
          extra_flags: >-
            --passphrase=env:P12_PASSWORD
            -Kapp.site.github.oauth-token=${{ secrets.GITHUB_TOKEN }}
            -Kapp.mac.signing-key=/tmp/apple-dev-id.p12
            -Kapp.mac.certificate=/tmp/apple-dev-id.p12
            -Kapp.mac.notarization.team-id=${{ secrets.APPLE_TEAM_ID }}
            -Kapp.mac.notarization.apple-id=${{ secrets.APPLE_ID }}
            -Kapp.mac.notarization.app-specific-password=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD_MACOS }}

  update-homebrew:
    needs: release
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      tag: ${{ needs.release.outputs.version }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
