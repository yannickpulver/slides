name: "Release"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Parse App Store Connect API key
        run: |
          echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.key' > /tmp/AuthKey.p8
          echo "APPLE_NOTARY_ISSUER_ID=$(echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.issuer_id')" >> $GITHUB_ENV
          echo "APPLE_NOTARY_KEY_ID=$(echo '${{ secrets.APPSTORE_CONNECT_API_JSON }}' | jq -r '.key_id')" >> $GITHUB_ENV

      - name: Build JVM JAR
        run: ./gradlew :composeApp:jvmJar

      - name: Build, sign, notarize and publish with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: make copied-site
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
          extra_flags: >-
            -Kapp.mac.notarization.issuer-id=${{ env.APPLE_NOTARY_ISSUER_ID }}
            -Kapp.mac.notarization.key-id=${{ env.APPLE_NOTARY_KEY_ID }}
            -Kapp.mac.notarization.private-key=/tmp/AuthKey.p8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
